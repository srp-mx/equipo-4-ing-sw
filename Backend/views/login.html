<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/logo.png">
    <link rel="stylesheet" href="assets/css/login.css">
    <title>Estudiantika - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[url(assets/img/login_bg.jpg)] h-screen bg-cover bg-center flex justify-center items-center">
    <div class="relative w-full max-w-lg p-8 rounded-lg">
      <div id="notification-container" class="hidden fixed top-[calc(50vh-270px)] left-1/2 -translate-x-1/2 z-[9999] w-full max-w-md p-4"></div>
        <h2 class="text-4xl font-semibold text-center text-white mb-6">estudiantika</h2>
	    <p id="message-login" class="text-center text-xl text-white">Ingresa para comenzar tu aventura</p>
        <div class="flex flex-col justify-center items-center mt-6 ">
            <button id="google-button" class="pixel-corner-button mb-4 flex bg-[#cbda3d] py-4 px-10 min-w-[300px] transition-all hover:bg-white">
                    <img src="assets/img/icono_google.png" class="w-6 h-6 mr-3"/>
                    continua con Google
            </button>
            <button id="email-button" class="pixel-corner-button mb-4 flex bg-[#cbda3d] py-4 px-10 min-w-[300px] transition-all hover:bg-white ">
                <img src="assets/img/icono_correo.png" class="w-6 h-6 mr-3"/>
                continua con correo
            </button>
            <div id="email-container" class="relative mb-2 hidden">
              <form method='POST' id="login-form" class="max-w-lg mx-auto mt-4 p-4 bg-[#2d314f] rounded-lg">
                <button id="return-botton" type="button" class="hidden absolute -top-3 left-0 flex items-center text-[#cbda3d] hover:text-white transition-all focus:text-[#ffffff]">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                  </svg>
                  <span class="ml-2 text-sm">Regresar</span>
              </button>
                <div class="relative flex mb-4">
                    <input type="email" id="email" name="email" class="peer block w-full px-3 py-2 text-sm text-white bg-transparent border-2 border-[#cbda3d] rounded-md focus:outline-none focus:border-[#cbda3d] " placeholder=" " required />
                    <label for="email" class="absolute text-sm text-[#2d314f] transform scale-50 top-1/6 left-3 -translate-y-1/6 transition-all duration-300 peer-placeholder-shown:top-1/4 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-[#cbda3d] peer-focus:top-0 peer-focus:scale-75 peer-focus:text-[#cbda3d]">
                        Correo
                    </label>
                </div>
            
                <div class="relative mb-4">
                    <input type="password" id="password" name="password" class="mb-6 peer block w-full px-3 py-2 text-sm text-white bg-transparent border-2 border-[#cbda3d] rounded-md focus:outline-none focus:border-[#cbda3d] " placeholder=" " required />
                    <label for="password" class="absolute text-sm text-[#2d314f] transform scale-50 top-1/3 left-3 -translate-y-1/6 transition-all duration-300 peer-placeholder-shown:top-1/4 peer-placeholder-shown:left-3 peer-placeholder-shown:scale-100 peer-placeholder-shown:text-[#cbda3d] peer-focus:top-0 peer-focus:scale-75 peer-focus:text-[#cbda3d]">
                        Contraseña
                    </label>
                    <button type="button" id="toggle-password" class="absolute  inset-y-0 right-3 flex items-center text-[#cbda3d]">
                      <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12c2.25-4.5 6.75-7.5 9.75-7.5s7.5 3 9.75 7.5c-2.25 4.5-6.75 7.5-9.75 7.5s-7.5-3-9.75-7.5z" />
                      </svg>
                  </button>
                </div>
            
                <div class="relative mb-2">
                  <button id="login-button" class="pixel-corner-button mb-4 flex bg-[#cbda3d] py-4 px-10 min-w-[300px] transition-all hover:bg-white">
                    Ingresar
                </button>
                </div>
            </form>
        </div>
    </div>
    <script src="assets/js/login.js"></script>
</body>
</html>
